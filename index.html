<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mélodia">
    <title>Mélodia - Votre Playlist</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fond animé -->
    <div class="animated-bg">
        <div class="bg-gradient"></div>
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
        <div class="bg-shape shape-4"></div>
        <div class="bg-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <!-- Overlay pour le drop -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay-content">
            <div class="drop-animation">
                <div class="drop-circle"></div>
                <div class="drop-circle"></div>
                <div class="drop-circle"></div>
            </div>
            <p>Déposez vos fichiers ici</p>
        </div>
    </div>

    <!-- Bouton FAB + -->
    <button class="fab-add" id="fabAdd" title="Ajouter des fichiers">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
    
    <!-- Input fichier caché -->
    <input type="file" id="fileInput" multiple accept="audio/*,video/*" hidden>

    <!-- Conteneur principal -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="icon">🎵</span> Mélodia
                </h1>
                <div class="header-actions">
                    <button class="btn-icon" id="clearAll" title="Tout effacer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="all">
                <span class="tab-icon">📋</span>
                <span>Tout</span>
            </button>
            <button class="tab-btn" data-tab="audio">
                <span class="tab-icon">🎵</span>
                <span>Musique</span>
            </button>
            <button class="tab-btn" data-tab="video">
                <span class="tab-icon">🎬</span>
                <span>Vidéos</span>
            </button>
        </nav>

        <!-- Playlist -->
        <div class="playlist-container" id="playlistContainer">
            <div class="playlist-header">
                <h2>Votre Playlist</h2>
                <span class="track-count" id="trackCount">0 titre(s)</span>
            </div>
            <div class="playlist-list" id="playlist">
                <!-- Les éléments seront ajoutés dynamiquement -->
            </div>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🎶</div>
                <p>Aucun média pour le moment</p>
            </div>
        </div>

        <!-- Lecteur principal -->
        <div class="player-bar" id="playerBar">
            <div class="audio-player" id="audioPlayer">
                <div class="player-info">
                    <div class="player-artwork" id="playerArtwork">🎵</div>
                    <div class="player-details">
                        <div class="player-title" id="playerTitle">Aucune lecture</div>
                        <div class="player-artist" id="playerArtist">Sélectionnez un média</div>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="ctrl-btn" id="shuffleBtn" title="Aléatoire">🔀</button>
                    <button class="ctrl-btn" id="prevBtn" title="Précédent">⏮️</button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="Lecture">▶️</button>
                    <button class="ctrl-btn" id="nextBtn" title="Suivant">⏭️</button>
                    <button class="ctrl-btn" id="repeatBtn" title="Répéter">🔁</button>
                </div>
                <div class="player-progress">
                    <span class="time-curr" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="time-total" id="totalTime">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Vidéo -->
    <div class="video-modal" id="videoModal">
        <div class="video-container">
            <button class="close-video" id="closeVideo">✕</button>
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <!-- Scripts dans l'ordre -->
    <script src="dragdrop.js"></script>
    <script src="playlist.js"></script>
    <script src="player.js"></script>
    <script src="app.js"></script>
    <script src="pwa.js"></script>
</body>
