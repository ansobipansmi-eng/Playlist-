<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <defs>
        <!-- Gradient pour l'effet glass -->
        <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
            <stop offset="50%" style="stop-color:#E8F5E9;stop-opacity:0.9"/>
            <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:0.85"/>
        </linearGradient>
        
        <!-- Effet de brillance glass -->
        <linearGradient id="glassShine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8"/>
            <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
            <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.05"/>
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0.05"/>
        </linearGradient>
        
        <!-- Gradient pour la note de musique -->
        <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1"/>
            <stop offset="50%" style="stop-color:#43A047;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1"/>
        </linearGradient>
        
        <!-- Ombre portée -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B5E20" flood-opacity="0.2"/>
        </filter>
        
        <!-- Effet glassmorphism -->
        <filter id="glassEffect">
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
        </filter>
    </defs>
    
    <!-- Fond arrondi avec effet glass -->
    <rect width="512" height="512" rx="120" fill="url(#glassGradient)"/>
    
    <!-- Bordure subtile -->
    <rect width="512" height="512" rx="120" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.8"/>
    <rect width="508" height="508" x="2" y="2" rx="118" fill="none" stroke="#A5D6A7" stroke-width="2" opacity="0.4"/>
    
    <!-- Effet de brillance glass -->
    <rect width="512" height="512" rx="120" fill="url(#glassShine)"/>
    
    <!-- Reflet en haut à gauche -->
    <ellipse cx="180" cy="150" rx="120" ry="80" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Note de musique -->
    <g transform="translate(256, 256)" filter="url(#shadow)">
        <!-- Corps de la note (ronde) -->
        <ellipse cx="-40" cy="50" rx="45" ry="38" fill="url(#noteGradient)" transform="rotate(-20)"/>
        
        <!-- Hampe -->
        <rect x="0" y="-80" width="12" height="140" rx="6" fill="url(#noteGradient)"/>
        
        <!-- Crochet de la croche -->
        <path d="M 8 -10 Q 60 -20 70 -60 Q 75 -80 60 -90" 
              fill="none" stroke="url(#noteGradient)" stroke-width="12" stroke-linecap="round"/>
        
        <!-- Petite note en haut à droite -->
        <ellipse cx="55" cy="-25" rx="18" ry="14" fill="url(#noteGradient)" transform="rotate(-20, 55, -25)" opacity="0.7"/>
        <rect x="58" y="-65" width="5" height="50" rx="2.5" fill="url(#noteGradient)" opacity="0.7"/>
        
        <!-- Point brillant sur la note -->
        <ellipse cx="-35" cy="40" rx="15" ry="10" fill="#FFFFFF" opacity="0.3" transform="rotate(-20)"/>
    </g>
    
    <!-- Particules décoratives -->
    <circle cx="380" cy="120" r="6" fill="#66BB6A" opacity="0.3"/>
    <circle cx="100" cy="380" r="8" fill="#81C784" opacity="0.25"/>
    <circle cx="420" cy="350" r="5" fill="#A5D6A7" opacity="0.3"/>
    <circle cx="130" cy="130" r="4" fill="#C8E6C9" opacity="0.4"/>
</svg>
